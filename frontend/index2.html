<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LojaTech • Loja Virtual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .product-card { transition: all 0.2s ease; }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50">
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-laptop text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-900">LojaTech</h1>
                    <p class="text-xs text-slate-500 -mt-1">Tecnologia com qualidade</p>
                </div>
            </div>
            <div class="flex items-center gap-x-4">
                <button onclick="showAddModal()" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-2xl text-sm font-semibold flex items-center gap-x-2">
                    <i class="fa-solid fa-plus"></i>
                    <span>Novo Produto</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">Nossos Produtos</h2>
                <p class="text-slate-600">Gerencie o catálogo da loja</p>
            </div>
            <div class="flex gap-x-3">
                <input type="text" id="search" placeholder="Buscar produto..." 
                       class="px-4 py-2.5 border rounded-2xl text-sm w-72" onkeyup="loadProducts()">
                <select id="category-filter" onchange="loadProducts()" class="px-4 py-2.5 border rounded-2xl text-sm">
                    <option value="">Todas categorias</option>
                    <option value="Periféricos">Periféricos</option>
                    <option value="Monitores">Monitores</option>
                    <option value="Áudio">Áudio</option>
                </select>
            </div>
        </div>

        <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Produtos carregados via JS -->
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl w-full max-w-md p-6">
            <h3 id="modal-title" class="text-xl font-bold mb-4">Novo Produto</h3>
            
            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="product-id">
                
                <div class="space-y-4">
                    <div>
                        <label class="text-sm font-medium">Nome do Produto</label>
                        <input type="text" id="nome" required class="w-full mt-1 px-4 py-2.5 border rounded-2xl">
                    </div>
                    <div>
                        <label class="text-sm font-medium">Descrição</label>
                        <textarea id="descricao" class="w-full mt-1 px-4 py-2.5 border rounded-2xl" rows="2"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm font-medium">Preço (R$)</label>
                            <input type="number" step="0.01" id="preco" required class="w-full mt-1 px-4 py-2.5 border rounded-2xl">
                        </div>
                        <div>
                            <label class="text-sm font-medium">Estoque</label>
                            <input type="number" id="estoque" class="w-full mt-1 px-4 py-2.5 border rounded-2xl">
                        </div>
                    </div>
                    <div>
                        <label class="text-sm font-medium">Categoria</label>
                        <select id="categoria" class="w-full mt-1 px-4 py-2.5 border rounded-2xl">
                            <option value="Periféricos">Periféricos</option>
                            <option value="Monitores">Monitores</option>
                            <option value="Áudio">Áudio</option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-x-3 mt-6">
                    <button type="button" onclick="hideModal()" class="flex-1 py-3 rounded-2xl border">Cancelar</button>
                    <button type="submit" class="flex-1 py-3 rounded-2xl bg-blue-600 text-white">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3001/api';

        async function loadProducts() {
            const container = document.getElementById('products-container');
            const search = document.getElementById('search').value;
            const categoria = document.getElementById('category-filter').value;

            let url = `${API}/produtos?`;
            if (search) url += `search=${search}&`;
            if (categoria) url += `categoria=${categoria}`;

            try {
                const res = await fetch(url);
                const products = await res.json();

                container.innerHTML = '';

                if (products.length === 0) {
                    container.innerHTML = `<p class="col-span-full text-center text-slate-500 py-8">Nenhum produto encontrado.</p>`;
                    return;
                }

                products.forEach(p => {
                    const card = `
                        <div class="product-card bg-white border rounded-3xl overflow-hidden flex flex-col">
                            <img src="${p.imagem_url || 'https://picsum.photos/id/201/300/160'}" class="w-full h-40 object-cover">
                            <div class="p-5 flex-1 flex flex-col">
                                <div class="flex-1">
                                    <h3 class="font-bold text-lg">${p.nome}</h3>
                                    <p class="text-sm text-slate-600 mt-1 line-clamp-2">${p.descricao || ''}</p>
                                </div>
                                
                                <div class="mt-4">
                                    <div class="flex justify-between items-center">
                                        <span class="text-2xl font-bold text-emerald-600">R$ ${parseFloat(p.preco).toFixed(2)}</span>
                                        <span class="text-xs px-3 py-1 bg-slate-100 rounded-full">${p.estoque} em estoque</span>
                                    </div>
                                    
                                    <div class="flex gap-x-2 mt-4">
                                        <button onclick="editProduct(${p.id})" class="flex-1 text-sm py-2 border rounded-2xl hover:bg-slate-50">Editar</button>
                                        <button onclick="deleteProduct(${p.id})" class="flex-1 text-sm py-2 border border-red-200 text-red-600 rounded-2xl hover:bg-red-50">Excluir</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-500">Erro ao carregar produtos. Verifique se o backend está rodando.</p>`;
            }
        }

        function showAddModal() {
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('modal-title').innerText = 'Novo Produto';
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        async function editProduct(id) {
            const res = await fetch(`${API}/produtos`);
            const products = await res.json();
            const product = products.find(p => p.id == id);

            if (!product) return;

            document.getElementById('product-id').value = product.id;
            document.getElementById('nome').value = product.nome;
            document.getElementById('descricao').value = product.descricao || '';
            document.getElementById('preco').value = product.preco;
            document.getElementById('estoque').value = product.estoque;
            document.getElementById('categoria').value = product.categoria || 'Periféricos';

            document.getElementById('modal-title').innerText = 'Editar Produto';
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function hideModal() {
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('modal').classList.add('hidden');
        }

        async function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('product-id').value;
            const isEdit = !!id;

            const data = {
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                preco: parseFloat(document.getElementById('preco').value),
                estoque: parseInt(document.getElementById('estoque').value) || 0,
                categoria: document.getElementById('categoria').value
            };

            try {
                let res;
                if (isEdit) {
                    res = await fetch(`${API}/produtos/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    res = await fetch(`${API}/produtos`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                if (res.ok) {
                    hideModal();
                    loadProducts();
                } else {
                    alert('Erro ao salvar produto');
                }
            } catch (err) {
                alert('Erro de conexão com o backend');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Excluir este produto?')) return;
            await fetch(`${API}/produtos/${id}`, { method: 'DELETE' });
            loadProducts();
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
        });
    </script>
</body>
</html>
